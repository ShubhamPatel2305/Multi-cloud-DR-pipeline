services:
  mongo:
    image: mongo:7.0
    container_name: dr-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 3s
      retries: 5

  aws-mumbai:
    build: ./app
    container_name: aws-mumbai
    environment:
      APP_ENV: local
      REGION_ID: aws-mumbai
      REGION_PRIORITY: 1
      MONGO_URI: mongodb://mongo:27017/dr_demo
      LOG_LEVEL: info
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "8081:8080"

  aws-singapore:
    build: ./app
    container_name: aws-singapore
    environment:
      APP_ENV: local
      REGION_ID: aws-singapore
      REGION_PRIORITY: 2
      MONGO_URI: mongodb://mongo:27017/dr_demo
      LOG_LEVEL: info
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "8082:8080"

  azure-secondary:
    build: ./app
    container_name: azure-secondary
    environment:
      APP_ENV: local
      REGION_ID: azure-secondary
      REGION_PRIORITY: 3
      MONGO_URI: mongodb://mongo:27017/dr_demo
      LOG_LEVEL: info
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "8083:8080"

  router:
    build: ./router
    container_name: dr-router
    environment:
      ROUTER_PORT: 8000
      POLL_INTERVAL_SECONDS: 3
      DEEP_PROBE_INTERVAL_SECONDS: 15
      UNHEALTHY_THRESHOLD: 2
      HEALTHY_THRESHOLD: 2
      ORIGIN_PRIMARY_URL: http://aws-mumbai:8080
      ORIGIN_STANDBY_URL: http://aws-singapore:8080
      ORIGIN_DR_URL: http://azure-secondary:8080
    depends_on:
      - aws-mumbai
      - aws-singapore
      - azure-secondary
    ports:
      - "8000:8000"

volumes:
  mongo_data:
